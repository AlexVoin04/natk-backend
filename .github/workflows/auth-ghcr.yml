name: Build and push auth to GHCR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  IMAGE_NAME: natk-auth

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: gradle

      - name: Set lowercase owner
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Extract Version from build.gradle
        id: extract_version
        run: |
          version=$(./gradlew :natk-auth:properties --no-daemon --console=plain -q | grep "^version:" | awk '{print $2}')
          echo "VERSION=$version" >> $GITHUB_ENV

      - name: Build Docker image using Jib
        run: |
          ./gradlew :natk-auth:jibDockerBuild --image=${{ env.IMAGE_NAME }}:latest

      - name: Tag and Push to GHCR
        run: |
          IMAGE_ID=ghcr.io/${{ env.OWNER_LC }}/${{ env.IMAGE_NAME }}
          VERSION=${{ env.VERSION }}

          # tag
          docker tag ${{ env.IMAGE_NAME }}:latest $IMAGE_ID:$VERSION
          docker tag ${{ env.IMAGE_NAME }}:latest $IMAGE_ID:latest

          # push
          docker push $IMAGE_ID:$VERSION
          docker push $IMAGE_ID:latest